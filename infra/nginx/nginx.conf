# =============================================================================
# Marketplace (basketplace.co) — Nginx Reverse Proxy Configuration
# Fixed/Dedicated IP per Domain → QuickPay Payment Hub (AnyPay)
# =============================================================================
#
# Architecture:
#   [basketplace.co  : 10.10.1.1] ──►  Nginx  ──►  marketplace-app:3000
#   [shop-a.basketplace.co : 10.10.1.2] ──►  Nginx  ──►  marketplace-app:3000
#   [custom-domain.com    : 10.10.1.3] ──►  Nginx  ──►  marketplace-app:3000
#                                           ├──►  QuickPay Payment Hub (proxy)
#                                           └──►  Webhook Callback receiver
#
# Each domain has its OWN dedicated IP (not shared).
# Webhook endpoints are protected by IP whitelisting.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'domain=$server_name upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting for webhook endpoints
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # ─── QuickPay / AnyPay Whitelisted IPs ────────────────────────────────
    # Update these with the actual QuickPay/AnyPay IP ranges
    geo $is_quickpay_ip {
        default          0;
        # QuickPay Production IPs
        103.253.132.0/24 1;
        103.253.133.0/24 1;
        # AnyPay Production IPs
        202.183.197.0/24 1;
        202.183.198.0/24 1;
        # Staging / Testing IPs
        54.169.0.0/16    1;
        # Local / Docker network (for development)
        172.16.0.0/12    1;
        10.0.0.0/8       1;
        127.0.0.1/32     1;
    }

    # ─── Upstream: Next.js Application ────────────────────────────────────
    upstream marketplace_app {
        server marketplace-app:3000;
        keepalive 32;
    }

    # ─── Upstream: QuickPay Payment Hub ───────────────────────────────────
    upstream quickpay_hub {
        server api.quickpay.co.th:443;
        keepalive 16;
    }

    # =====================================================================
    # Domain 1: basketplace.co (Primary) — Dedicated IP: 10.10.1.1
    # =====================================================================
    server {
        listen 10.10.1.1:80;
        listen 10.10.1.1:443 ssl;
        server_name basketplace.co www.basketplace.co;

        ssl_certificate     /etc/nginx/ssl/basketplace.co/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/basketplace.co/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:SSL_basketplace:10m;
        ssl_session_timeout 1d;

        # Force HTTPS
        if ($scheme != "https") {
            return 301 https://$host$request_uri;
        }

        # www → non-www redirect
        if ($host = "www.basketplace.co") {
            return 301 https://basketplace.co$request_uri;
        }

        # ── QuickPay Forward Proxy ──────────────────────────────
        location /proxy/quickpay/ {
            internal;
            proxy_pass https://api.quickpay.co.th/;
            proxy_set_header Host api.quickpay.co.th;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Domain basketplace.co;
            proxy_ssl_verify on;
            proxy_ssl_server_name on;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # ── QuickPay Webhook Callback (IP Whitelisted) ──────────
        location /api/webhook/quickpay {
            if ($is_quickpay_ip = 0) {
                return 403 '{"error":"IP not whitelisted","ip":"$remote_addr"}';
            }

            limit_req zone=webhook_limit burst=10 nodelay;

            proxy_pass http://marketplace_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Webhook-Domain basketplace.co;
            proxy_set_header X-Webhook-Dedicated-IP 10.10.1.1;
            proxy_read_timeout 30s;
        }

        # ── AnyPay Webhook Callback (IP Whitelisted) ────────────
        location /api/webhook/anypay {
            if ($is_quickpay_ip = 0) {
                return 403 '{"error":"IP not whitelisted","ip":"$remote_addr"}';
            }

            limit_req zone=webhook_limit burst=10 nodelay;

            proxy_pass http://marketplace_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Webhook-Domain basketplace.co;
            proxy_set_header X-Webhook-Dedicated-IP 10.10.1.1;
        }

        # ── All other requests → Next.js app ────────────────────
        location / {
            proxy_pass http://marketplace_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Domain basketplace.co;
            proxy_set_header X-Dedicated-IP 10.10.1.1;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # =====================================================================
    # Default server — catch-all (reject unknown hosts)
    # =====================================================================
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Include dynamically generated domain configs (vendor custom domains)
MAIN_DOMAIN=basketplace.co
NEXTAUTH_URL=https://basketplace.co
NEXT_PUBLIC_BASE_URL=https://basketplace.co    include /etc/nginx/conf.d/domains/*.conf;
}
