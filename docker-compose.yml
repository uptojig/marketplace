# =============================================================================
# Docker Compose — basketplace.co
# Marketplace App + Nginx Reverse Proxy (Dedicated IP per Domain)
# =============================================================================

version: "3.9"

services:
  # ── Next.js Marketplace Application ──────────────────────
  marketplace-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy (Dedicated IP per Domain) ────────
  nginx:
    image: nginx:1.25-alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    ports:
      # Primary domain: basketplace.co
      - "10.10.1.1:80:80"
      - "10.10.1.1:443:443"
      # Additional domains get their own IPs via the
      # dynamically generated configs in conf.d/domains/
      # Uncomment and add as you provision new domains:
      # - "10.10.1.2:80:80"
      # - "10.10.1.2:443:443"
      # - "10.10.1.3:80:80"
      # - "10.10.1.3:443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - internal
    depends_on:
      - marketplace-app

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
