name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - feat/multi-tenant-provisioning
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (defaults to the branch the action runs on)"
        required: false

# Serialize deploys — never two at once on the same droplet.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Resolve target branch
        id: branch
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "name=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Trigger deploy on droplet
        run: |
          # No pre-keyscan — `StrictHostKeyChecking=accept-new` below
          # writes the key on first connect. The earlier explicit
          # `ssh-keyscan` step was failing with exit 1 from GitHub
          # Actions runners (the runner egress IPs hit a TCP-level
          # timeout reaching the droplet on port 22 within keyscan's
          # 5s default), taking the whole workflow down even though
          # the actual deploy ssh ran fine. We don't need the pre-scan
          # anyway — accept-new handles the first connection.
          mkdir -p ~/.ssh
          ssh -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=30 \
              root@${{ secrets.DROPLET_IP }} \
              "/opt/marketplace/infra/setup/deploy.sh ${{ steps.branch.outputs.name }}"
