name: Set droplet env (one secret at a time)

# Manual workflow_dispatch — pick a secret name from the dropdown,
# the workflow SSHes into the droplet, upserts the matching line in
# /etc/marketplace/control.env, and restarts marketplace-control so
# the new value is picked up.
#
# The secret VALUE always comes from the repo's Actions secrets — it
# is never accepted as a workflow input (inputs are recorded in run
# history; secrets are not). Add the secret in
# Settings → Secrets and variables → Actions before triggering.

on:
  workflow_dispatch:
    inputs:
      key:
        description: "Env var name to set (must match a repo secret of the same name)"
        required: true
        type: choice
        options:
          - RESEND_API_KEY
          - EMAIL_FROM
          - ANYPAY_API_KEY
          - ANYPAY_SECRET
          - ANYPAY_MERCHANT_ID
          - IAPP_API_KEY

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEY: ${{ inputs.key }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      ANYPAY_API_KEY: ${{ secrets.ANYPAY_API_KEY }}
      ANYPAY_SECRET: ${{ secrets.ANYPAY_SECRET }}
      ANYPAY_MERCHANT_ID: ${{ secrets.ANYPAY_MERCHANT_ID }}
      IAPP_API_KEY: ${{ secrets.IAPP_API_KEY }}
    steps:
      - name: Pick value from env
        id: pick
        run: |
          # Resolve the chosen secret's value into a step output.
          # `::add-mask::` ensures any accidental echo in subsequent
          # steps is redacted from the workflow log.
          case "$KEY" in
            RESEND_API_KEY)      VAL="$RESEND_API_KEY" ;;
            EMAIL_FROM)          VAL="$EMAIL_FROM" ;;
            ANYPAY_API_KEY)      VAL="$ANYPAY_API_KEY" ;;
            ANYPAY_SECRET)       VAL="$ANYPAY_SECRET" ;;
            ANYPAY_MERCHANT_ID)  VAL="$ANYPAY_MERCHANT_ID" ;;
            IAPP_API_KEY)        VAL="$IAPP_API_KEY" ;;
            *) echo "Unknown key: $KEY"; exit 1 ;;
          esac
          if [ -z "$VAL" ]; then
            echo "::error::Secret $KEY is not set in this repo"
            exit 1
          fi
          echo "::add-mask::$VAL"
          # Pass to next step via env file (so it stays masked).
          {
            echo "TARGET_VALUE<<__EOF__"
            echo "$VAL"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Upsert env var on droplet + restart service
        env:
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          TARGET_VALUE: ${{ env.TARGET_VALUE }}
        run: |
          mkdir -p ~/.ssh
          # Pass the value via SSH env (`SendEnv`/`AcceptEnv` needs
          # sshd config; instead we read on stdin to avoid any
          # value-in-argv leak). The remote script reads the value
          # from /dev/stdin and never prints it.
          printf '%s' "$TARGET_VALUE" | ssh \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            "root@${DROPLET_IP}" \
            "bash -s '$KEY'" <<'REMOTE'
            set -euo pipefail
            KEY="$1"
            ENV_FILE="/etc/marketplace/control.env"
            [ -f "$ENV_FILE" ] || { echo "missing $ENV_FILE"; exit 1; }
            # Read the value from stdin (passed via the local printf).
            VAL=$(cat)
            # Drop any existing line for this key, then append the new
            # one. `sed` in-place; backup written to .bak as a safety
            # net the operator can roll back to.
            cp -a "$ENV_FILE" "$ENV_FILE.bak"
            sed -i "/^${KEY}=/d" "$ENV_FILE"
            # Escape quotes inside VAL so the env file parser is happy.
            ESC=$(printf '%s' "$VAL" | sed 's/"/\\"/g')
            printf '%s="%s"\n' "$KEY" "$ESC" >> "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            echo "→ upserted ${KEY} in ${ENV_FILE}"
            # Restart the control plane so the new value is picked up.
            systemctl restart marketplace-control
            echo "→ marketplace-control restarted"
            # Show only that the key is present (not its value).
            grep -c "^${KEY}=" "$ENV_FILE" | xargs -I{} echo "→ ${KEY} lines in env file: {}"
          REMOTE
